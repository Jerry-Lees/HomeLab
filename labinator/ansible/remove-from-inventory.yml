---
# ============================================================
# Ansible Inventory Removal Playbook
# Removes a host entry from the inventory file on the
# development server.
# ============================================================
# Usage (called automatically by decommission.py):
#   ansible-playbook -i dev.example.com, remove-from-inventory.yml \
#     -e hostname=myhost \
#     -e inventory_file=/root/ansible/inventory/hosts
# ============================================================
- name: Remove host from Ansible inventory
  hosts: all
  gather_facts: false

  tasks:
    - name: Write inventory removal script
      copy:
        dest: /tmp/remove_inventory_{{ hostname }}.py
        content: |
          import os, sys, re

          path     = os.environ['INVENTORY_FILE']
          hostname = os.environ['HOSTNAME']

          lines = open(path).readlines()

          new_lines = []
          removed = False
          for line in lines:
              # Match lines like: hostname ansible_host=...
              # or just: hostname  (with optional trailing whitespace/comment)
              stripped = line.split('#')[0].strip()
              if re.match(rf'^{re.escape(hostname)}(\s|$)', stripped):
                  removed = True
                  continue
              new_lines.append(line)

          if removed:
              open(path, 'w').write(''.join(new_lines))
              print(f"Removed {hostname} from inventory")
          else:
              print(f"{hostname} not found in inventory — nothing to remove")

    - name: Remove host from inventory file
      shell: python3 /tmp/remove_inventory_{{ hostname }}.py
      environment:
        INVENTORY_FILE: "{{ inventory_file }}"
        HOSTNAME: "{{ hostname }}"
      changed_when: true
      register: inv_result

    - name: Show inventory result
      debug:
        msg: "{{ inv_result.stdout }}"

    - name: Clean up script
      file:
        path: /tmp/remove_inventory_{{ hostname }}.py
        state: absent
