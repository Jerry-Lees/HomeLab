---
# ============================================================
# RedHat / Rocky Linux / AlmaLinux / CentOS Stream OS-specific variables
# Loaded automatically by post-deploy*.yml via:
#   include_vars: "vars/{{ ansible_os_family }}.yml"
# Note: Many packages below require EPEL, enabled by pre-install-RedHat.yml
# ============================================================

ssh_service: sshd
sudo_group: wheel
chrony_conf_path: /etc/chrony.conf
chrony_service: chronyd

packages:
  # --- Network tools ---
  - net-tools          # ifconfig, netstat, route, arp
  - iproute            # ip addr, ip route, ss, tc
  - nmap               # port scanner
  - iputils            # ping, arping
  - traceroute
  - mtr                # combined ping+traceroute
  - bind-utils         # dig, nslookup, host
  - nmap-ncat          # nc - network utility
  - socat              # advanced netcat
  - tcpdump            # packet capture
  - iperf3             # network bandwidth testing (EPEL)
  - fping              # fast parallel ping (EPEL)
  - arp-scan           # ARP scanner (EPEL)
  - ethtool            # ethernet settings
  - iftop              # live bandwidth monitor (EPEL)
  - nload              # network load monitor (EPEL)
  - curl               # HTTP client
  - wget               # HTTP/FTP download

  # --- Text editors ---
  - nano
  - vim

  # --- Data/JSON/YAML tools ---
  - jq                 # JSON processor (EPEL)
  - yamllint           # YAML linter (EPEL)
  - python3-jsonschema # JSON schema validation (EPEL)

  # --- Shell/script linting ---
  - ShellCheck         # EPEL

  # --- Archive/compression tools ---
  - zip
  - unzip
  - tar
  - gzip
  - bzip2
  - xz
  - p7zip              # 7z (EPEL)

  # --- SSH tools ---
  - sshpass            # non-interactive SSH password auth (EPEL)
  - openssh-clients

  # --- NTP client ---
  - chrony

  # --- NFS client ---
  - nfs-utils
  - nfs4-acl-tools

  # --- SNMP ---
  - net-snmp           # snmpd daemon
  - net-snmp-utils     # snmpwalk, snmpget, etc.

  # --- Hardware inventory tools ---
  - lshw               # EPEL
  - pciutils           # lspci
  - usbutils           # lsusb
  - dmidecode          # DMI/SMBIOS hardware info
  - hdparm
  - smartmontools      # S.M.A.R.T. disk monitoring

  # --- System monitoring & process tools ---
  - htop               # EPEL
  - iotop
  - lsof
  - strace
  - sysstat            # sar, iostat, mpstat
  - pcp-system-tools   # provides dstat equivalent

  # --- Development / misc ---
  - git
  - rsync
  - screen
  - tmux
  - tree
  - less
  - psmisc             # killall, fuser, pstree
  - procps-ng          # ps, top, vmstat, free, etc.
  - util-linux

  # --- Python ---
  - python3
  - python3-pip
  - python3-virtualenv # EPEL

  # --- Misc useful ---
  - bc
  - at
  - cronie             # cron daemon
  - logrotate
