---
# ============================================================
# SUSE / openSUSE Leap / Tumbleweed OS-specific variables
# Loaded automatically by post-deploy*.yml via:
#   include_vars: "vars/{{ ansible_os_family }}.yml"
# ============================================================

ssh_service: sshd
sudo_group: wheel
chrony_conf_path: /etc/chrony.conf
chrony_service: chronyd

packages:
  # --- Network tools ---
  - net-tools          # ifconfig, netstat, route, arp
  - iproute2           # ip addr, ip route, ss, tc
  - nmap               # port scanner
  - iputils            # ping, arping
  - traceroute
  - mtr                # combined ping+traceroute
  - bind-utils         # dig, nslookup, host
  - netcat-openbsd     # nc - network utility
  - socat              # advanced netcat
  - tcpdump            # packet capture
  # iperf3 not in default Leap repos — needs network:utilities OBS repo
  - fping              # fast parallel ping
  - arp-scan           # ARP scanner
  - ethtool            # ethernet settings
  - iftop              # live bandwidth monitor
  - nload              # network load monitor
  - curl               # HTTP client
  - wget               # HTTP/FTP download

  # --- Text editors ---
  - nano
  - vim

  # --- Data/JSON/YAML tools ---
  - jq                 # JSON processor
  - python3-yamllint   # YAML linter
  - python3-jsonschema # JSON schema validation

  # --- Shell/script linting ---
  - ShellCheck

  # --- Archive/compression tools ---
  - zip
  - unzip
  - tar
  - gzip
  - bzip2
  - xz
  - p7zip              # 7z

  # --- SSH tools ---
  - sshpass            # non-interactive SSH password auth
  - openssh-clients

  # --- NTP client ---
  - chrony

  # --- NFS client ---
  - nfs-client
  - nfs4-acl-tools

  # --- SNMP ---
  - net-snmp           # includes both daemon and utilities on SUSE

  # --- Hardware inventory tools ---
  - lshw
  - pciutils           # lspci
  - usbutils           # lsusb
  - dmidecode          # DMI/SMBIOS hardware info
  - hdparm
  - smartmontools      # S.M.A.R.T. disk monitoring
  - hwinfo             # native to SUSE/openSUSE

  # --- System monitoring & process tools ---
  - htop
  - iotop
  - lsof
  - strace
  - sysstat            # sar, iostat, mpstat
  - dstat

  # --- Development / misc ---
  - git
  - rsync
  - screen
  - tmux
  - tree
  - less
  - psmisc             # killall, fuser, pstree
  - procps             # ps, top, vmstat, free, etc.
  - util-linux

  # --- Python ---
  - python3
  - python3-pip
  - python3-virtualenv

  # --- Misc useful ---
  - bc
  - at
  - cron
  - logrotate
