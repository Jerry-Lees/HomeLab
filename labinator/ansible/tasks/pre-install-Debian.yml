---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 0

# ── Docker CE repository setup ────────────────────────────────────────────────
# docker-ce is not in the standard Ubuntu/Debian repos.
# If any of the package lists include docker-ce, add Docker's official apt repo
# before the package install tasks run.
- name: Set up Docker apt repository (when docker-ce is in requested packages)
  when: "'docker-ce' in (profile_packages | default([]) + extra_packages | default([]) + packages | default([]))"
  block:
    - name: Install Docker repository prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Create Docker GPG keyring directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download and install Docker GPG key
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
        https://download.docker.com/linux/ubuntu \
        $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
        | tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Update apt cache after adding Docker repository
      apt:
        update_cache: true
