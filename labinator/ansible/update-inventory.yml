---
# ============================================================
# Ansible Inventory Update Playbook
# SSHes to the server configured in ansible_inventory.server and:
#   1. Sets up SSH key auth from dev server to new container
#   2. Adds the new host to the correct group in inventory
# ============================================================
# Usage (called automatically by deploy_lxc.py):
#   ansible-playbook -i dev.example.com, update-inventory.yml \
#     -e new_hostname=myhost \
#     -e new_ip=192.168.220.100 \
#     -e inventory_file=/root/ansible/inventory/hosts \
#     -e inventory_group=linux \
#     -e password=secret \
#     -e node_domain=example.com
# ============================================================
- name: Update Ansible inventory on development server
  hosts: all
  gather_facts: false

  tasks:
    # --------------------------------------------------------
    # SSH key setup: dev server -> new container
    # --------------------------------------------------------
    - name: Remove stale known_hosts entry for container IP
      shell: "ssh-keygen -R {{ new_ip }} 2>/dev/null || true"
      changed_when: false
      failed_when: false

    - name: Remove stale known_hosts entry for container FQDN
      shell: "ssh-keygen -R {{ new_hostname }}.{{ node_domain }} 2>/dev/null || true"
      changed_when: false
      failed_when: false
      when: node_domain is defined and node_domain != ''

    - name: Add container to known_hosts (by IP)
      shell: "ssh-keyscan -H {{ new_ip }} >> ~/.ssh/known_hosts"
      changed_when: true
      failed_when: false

    - name: Add container to known_hosts (by FQDN)
      shell: "ssh-keyscan -H {{ new_hostname }}.{{ node_domain }} >> ~/.ssh/known_hosts"
      changed_when: true
      failed_when: false
      when: node_domain is defined and node_domain != ''

    - name: Copy SSH key to container (via IP)
      shell: "sshpass -p {{ password | quote }} ssh-copy-id -o StrictHostKeyChecking=no root@{{ new_ip }}"
      changed_when: true
      no_log: true

    - name: Copy SSH key to container (via FQDN)
      shell: "sshpass -p {{ password | quote }} ssh-copy-id -o StrictHostKeyChecking=no root@{{ new_hostname }}.{{ node_domain }}"
      changed_when: true
      failed_when: false
      no_log: true
      when: node_domain is defined and node_domain != ''

    # --------------------------------------------------------
    # Inventory update
    # --------------------------------------------------------
    - name: Check that inventory file exists
      stat:
        path: "{{ inventory_file }}"
      register: inv_stat

    - name: Fail if inventory file does not exist
      fail:
        msg: "Inventory file {{ inventory_file }} not found on {{ inventory_hostname }}"
      when: not inv_stat.stat.exists

    - name: Check if host is already in inventory
      shell: "grep -c '^{{ new_hostname }}' {{ inventory_file }} || true"
      register: host_exists
      changed_when: false

    - name: Create backup of inventory file before modifying
      copy:
        src: "{{ inventory_file }}"
        dest: "{{ inventory_file }}.bak.{{ ansible_date_time.epoch | default('backup') }}"
        remote_src: true
      when: host_exists.stdout | int == 0

    - name: Write host insertion script
      copy:
        dest: /tmp/insert_host_{{ new_hostname }}.py
        content: |
          import os
          group = os.environ['INV_GROUP']
          entry = os.environ['INV_ENTRY']
          path = os.environ['INV_FILE']
          lines = open(path).readlines()
          in_group = False
          insert_pos = len(lines)
          for i, line in enumerate(lines):
              stripped = line.strip()
              if stripped == f'[{group}]':
                  in_group = True
              elif in_group and stripped.startswith('['):
                  # Insert before next section, skipping trailing blank lines
                  insert_pos = i
                  while insert_pos > 0 and not lines[insert_pos - 1].strip():
                      insert_pos -= 1
                  break
          lines.insert(insert_pos, entry + '\n')
          open(path, 'w').write(''.join(lines))
      when: host_exists.stdout | int == 0

    - name: Add host at end of [{{ inventory_group }}] section
      shell: python3 /tmp/insert_host_{{ new_hostname }}.py
      environment:
        INV_GROUP: "{{ inventory_group }}"
        INV_ENTRY: "{{ new_hostname }} ansible_host={{ new_hostname }}.{{ node_domain }} ansible_python_interpreter=/usr/bin/python3"
        INV_FILE: "{{ inventory_file }}"
      when: host_exists.stdout | int == 0
      register: inv_updated
      changed_when: true

    - name: Remove insertion script
      file:
        path: /tmp/insert_host_{{ new_hostname }}.py
        state: absent

    - name: Show result
      debug:
        msg: >-
          {% if host_exists.stdout | int > 0 %}
          Host '{{ new_hostname }}' already exists in inventory - no change made.
          {% elif inv_updated.changed %}
          Successfully added '{{ new_hostname }} ansible_host={{ new_hostname }}.{{ node_domain }} ansible_python_interpreter=/usr/bin/python3'
          to end of [{{ inventory_group }}] group in {{ inventory_file }}
          {% else %}
          No changes made.
          {% endif %}

    - name: Show updated inventory section (confirmation)
      shell: "grep -A 20 '\\[{{ inventory_group }}\\]' {{ inventory_file }} | head -25"
      register: group_section
      changed_when: false
      when: inv_updated.changed | default(false)

    - name: Display updated group section
      debug:
        msg: "{{ group_section.stdout_lines }}"
      when: inv_updated.changed | default(false)
