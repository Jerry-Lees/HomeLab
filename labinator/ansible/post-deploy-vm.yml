---
# ============================================================
# Post-Deployment Configuration Playbook for QEMU VMs
# Runs against a freshly created VM provisioned via cloud-init.
#
# Key differences from post-deploy.yml (LXC containers):
#   - Uses vm_hostname / password variables
#   - Waits for cloud-init to finish before modifying the system
#   - Installs and enables qemu-guest-agent
#   - Extended wait_for_connection timeout (cloud-init first-boot delay)
#   - Ansible connects via SSH key (no sshpass needed)
#
# ============================================================
# Usage (called automatically by deploy_vm.py):
#   ansible-playbook -i <IP>, post-deploy-vm.yml \
#     -e vm_hostname=myhost \
#     -e password=secret \
#     --private-key ~/.ssh/id_rsa
# ============================================================
- name: Post-deploy VM configuration
  hosts: all
  gather_facts: false
  become: true

  vars:
    vm_hostname: "{{ vm_hostname }}"
    password: "{{ password }}"

  tasks:
    # --------------------------------------------------------
    # Wait for SSH and cloud-init to finish
    # --------------------------------------------------------
    - name: Wait for SSH connection to be available
      wait_for_connection:
        delay: 5
        timeout: 1800

    - name: Gather facts now that SSH is up
      setup:

    - name: Load OS-specific variables
      include_vars: "vars/{{ ansible_os_family }}.yml"

    - name: Ensure correct sudo group for OS family
      set_fact:
        sudo_group: "{{ 'sudo' if ansible_os_family == 'Debian' else 'wheel' }}"

    - name: Wait for cloud-init first-boot to complete
      wait_for:
        path: /run/cloud-init/result.json
        timeout: 1800

    # --------------------------------------------------------
    # Hostname
    # --------------------------------------------------------
    - name: Set system hostname
      hostname:
        name: "{{ vm_hostname }}"

    - name: Ensure /etc/hosts has 127.0.1.1 entry
      lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: "127.0.1.1 {{ vm_hostname }}"
        state: present

    # --------------------------------------------------------
    # User: {{ addusername }} (same password as root)
    # --------------------------------------------------------
    - name: Create '{{ addusername }}' user
      user:
        name: "{{ addusername }}"
        shell: /bin/bash
        groups: "{{ 'sudo' if ansible_os_family == 'Debian' else 'wheel' }}"
        append: true
        create_home: true
        state: present

    - name: Set '{{ addusername }}' user password
      shell: "echo '{{ addusername }}:{{ password }}' | chpasswd"
      no_log: true

    - name: Set root password (ensure it matches)
      shell: "echo 'root:{{ password }}' | chpasswd"
      no_log: true

    # --------------------------------------------------------
    # SSH Configuration
    # --------------------------------------------------------
    - name: Allow root login via password in sshd_config
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin yes'
        backup: true

    - name: Allow password authentication in sshd_config
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication yes'
        backup: true

    - name: Restart SSH service to apply changes
      service:
        name: "{{ ssh_service }}"
        state: restarted
        enabled: true

    # --------------------------------------------------------
    # Timezone
    # --------------------------------------------------------
    - name: Set timezone
      timezone:
        name: "{{ timezone }}"

    # --------------------------------------------------------
    # Install packages
    # --------------------------------------------------------
    - name: Run OS-specific pre-install tasks
      include_tasks: "tasks/pre-install-{{ ansible_os_family }}.yml"

    - name: Install all standard tools and utilities
      package:
        name: "{{ packages }}"
        state: present

    - name: Install extra packages (if specified)
      package:
        name: "{{ extra_packages }}"
        state: present
      when: extra_packages | default([]) | length > 0

    - name: Install qemu-guest-agent
      package:
        name: qemu-guest-agent
        state: present

    # --------------------------------------------------------
    # QEMU Guest Agent
    # --------------------------------------------------------
    - name: Enable and start qemu-guest-agent
      service:
        name: qemu-guest-agent
        enabled: true
        state: started

    # --------------------------------------------------------
    # NTP Configuration (chrony)
    # --------------------------------------------------------
    - name: Configure chrony NTP
      template:
        src: templates/chrony.conf.j2
        dest: "{{ chrony_conf_path }}"
        backup: true

    - name: Enable and restart chrony
      service:
        name: "{{ chrony_service }}"
        enabled: true
        state: restarted

    # --------------------------------------------------------
    # SNMP Configuration
    # --------------------------------------------------------
    - name: Deploy snmpd.conf from template
      template:
        src: templates/snmpd.conf.j2
        dest: /etc/snmp/snmpd.conf
        backup: true
      vars:
        hostname: "{{ vm_hostname }}"
        deploy_date: "{{ ansible_date_time.iso8601 }}"

    - name: Ensure MIBS directory exists
      file:
        path: /var/lib/snmp/mibs
        state: directory

    - name: Enable and restart snmpd
      service:
        name: snmpd
        enabled: true
        state: restarted

    # --------------------------------------------------------
    # Final: Full system upgrade
    # --------------------------------------------------------
    - name: Run OS-specific upgrade tasks
      include_tasks: "tasks/upgrade-{{ ansible_os_family }}.yml"

    # --------------------------------------------------------
    # Status report
    # --------------------------------------------------------
    - name: Get system IP addresses
      shell: ip -4 addr show scope global | grep inet | awk '{print $2}'
      register: ip_addrs
      changed_when: false

    - name: Show completion summary
      debug:
        msg:
          - "=========================================="
          - "Post-deployment VM configuration complete!"
          - "Hostname : {{ vm_hostname }}"
          - "IP(s)    : {{ ip_addrs.stdout_lines | join(', ') }}"
          - "Timezone : {{ ansible_date_time.tz }}"
          - "NTP      : chrony configured"
          - "SNMP     : community='{{ snmp_community }}' (rw) on :161"
          - "Users    : root, {{ addusername }} (same password)"
          - "SSH      : PermitRootLogin yes"
          - "QEMU GA  : enabled"
          - "=========================================="
