---
# ============================================================
# DNS Registration Playbook
# SSHes to the BIND DNS server and adds:
#   - A record in the forward zone
#   - PTR record in the reverse zone
# Then reloads BIND with rndc reload.
# ============================================================
# Usage (called automatically by deploy_lxc.py):
#   ansible-playbook -i $(dns.server from config.yaml), add-dns.yml \
#     -e new_hostname=myhost \
#     -e new_ip=10.10.10.140 \
#     -e new_fqdn=myhost.example.com \
#     -e forward_zone_file=/var/lib/bind/example.com.hosts \
#     -e reverse_zone_file=/var/lib/bind/10.10.10.in-addr.arpa.hosts
# ============================================================
- name: Register DNS records on BIND server
  hosts: all
  gather_facts: false

  tasks:
    - name: Write A-record insertion script
      copy:
        dest: /tmp/add_dns_forward_{{ new_hostname }}.py
        content: |
          import os, re, datetime

          def increment_serial(s):
              s = s.strip()
              today = datetime.date.today().strftime('%Y%m%d')
              if len(s) == 10:
                  if s[:8] == today:
                      nn = min(int(s[8:]) + 1, 99)
                      return f"{today}{nn:02d}"
                  else:
                      return f"{today}01"
              else:
                  return str(int(s) + 1)

          path     = os.environ['ZONE_FILE']
          hostname = os.environ['NEW_HOSTNAME']
          ip       = os.environ['NEW_IP']

          lines = open(path).readlines()

          # Check if record already exists — skip if correct, update if IP changed
          for i, line in enumerate(lines):
              stripped = line.split(';')[0].strip()
              if re.match(rf'^{re.escape(hostname)}\s', stripped):
                  if ip in stripped:
                      print(f"A record for {hostname} already correct ({ip}) — skipping")
                      exit(0)
                  else:
                      # IP changed — update in place, then update serial and write
                      lines[i] = f"{hostname}\t\tIN\tA\t{ip}\n"
                      new_lines = []
                      serial_updated = False
                      for line in lines:
                          if not serial_updated:
                              m = re.search(r'(\d{8,12})\s*;?\s*[Ss]erial', line)
                              if m:
                                  line = line[:m.start(1)] + increment_serial(m.group(1)) + line[m.end(1):]
                                  serial_updated = True
                          new_lines.append(line)
                      open(path, 'w').write(''.join(new_lines))
                      print(f"Updated A record: {hostname} -> {ip}")
                      exit(0)

          # Record does not exist — add it
          new_lines = []
          serial_updated = False
          for line in lines:
              if not serial_updated:
                  m = re.search(r'(\d{8,12})\s*;?\s*[Ss]erial', line)
                  if m:
                      line = line[:m.start(1)] + increment_serial(m.group(1)) + line[m.end(1):]
                      serial_updated = True
              new_lines.append(line)

          if new_lines and not new_lines[-1].endswith('\n'):
              new_lines[-1] += '\n'
          new_lines.append(f"{hostname}\t\tIN\tA\t{ip}\n")
          open(path, 'w').write(''.join(new_lines))
          print(f"Added A record: {hostname} -> {ip}")

    - name: Add A record to forward zone
      shell: python3 /tmp/add_dns_forward_{{ new_hostname }}.py
      environment:
        ZONE_FILE: "{{ forward_zone_file }}"
        NEW_HOSTNAME: "{{ new_hostname }}"
        NEW_IP: "{{ new_ip }}"
      changed_when: true
      register: forward_result

    - name: Show forward zone result
      debug:
        msg: "{{ forward_result.stdout }}"

    - name: Write PTR-record insertion script
      copy:
        dest: /tmp/add_dns_reverse_{{ new_hostname }}.py
        content: |
          import os, re, datetime

          def increment_serial(s):
              s = s.strip()
              today = datetime.date.today().strftime('%Y%m%d')
              if len(s) == 10:
                  if s[:8] == today:
                      nn = min(int(s[8:]) + 1, 99)
                      return f"{today}{nn:02d}"
                  else:
                      return f"{today}01"
              else:
                  return str(int(s) + 1)

          path      = os.environ['ZONE_FILE']
          ip        = os.environ['NEW_IP']
          fqdn      = os.environ['NEW_FQDN']
          last_octet = ip.split('.')[-1]
          fqdn_dot  = fqdn if fqdn.endswith('.') else fqdn + '.'

          if not os.path.exists(path):
              print(f"Reverse zone file {path} not found — skipping PTR record")
              exit(0)

          lines = open(path).readlines()

          # Skip if PTR already present for this octet
          for line in lines:
              stripped = line.split(';')[0].strip()
              if re.match(rf'^{re.escape(last_octet)}\s', stripped):
                  print(f"PTR record for {last_octet} already exists — skipping")
                  exit(0)

          # Increment serial in SOA
          new_lines = []
          serial_updated = False
          for line in lines:
              if not serial_updated:
                  m = re.search(r'(\d{8,12})\s*;?\s*[Ss]erial', line)
                  if m:
                      line = line[:m.start(1)] + increment_serial(m.group(1)) + line[m.end(1):]
                      serial_updated = True
              new_lines.append(line)

          if new_lines and not new_lines[-1].endswith('\n'):
              new_lines[-1] += '\n'
          new_lines.append(f"{last_octet}\t\tIN\tPTR\t{fqdn_dot}\n")
          open(path, 'w').write(''.join(new_lines))
          print(f"Added PTR record: {last_octet} -> {fqdn_dot}")

    - name: Add PTR record to reverse zone
      shell: python3 /tmp/add_dns_reverse_{{ new_hostname }}.py
      environment:
        ZONE_FILE: "{{ reverse_zone_file }}"
        NEW_IP: "{{ new_ip }}"
        NEW_FQDN: "{{ new_fqdn }}"
      changed_when: true
      register: reverse_result

    - name: Show reverse zone result
      debug:
        msg: "{{ reverse_result.stdout }}"

    - name: Reload BIND to apply changes
      command: rndc reload
      changed_when: true
      # Always reload even if PTR was skipped, so the A record takes effect

    - name: Clean up scripts
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/add_dns_forward_{{ new_hostname }}.py
        - /tmp/add_dns_reverse_{{ new_hostname }}.py
