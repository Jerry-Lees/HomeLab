# ============================================================
# Cloud Image Catalog for deploy_vm.py
# ============================================================
# Edit this file to add, remove, or update OS options without
# touching deploy_vm.py.  All entries must be cloud-init
# capable images (pre-installed OS, not installer ISOs).
#
# Fields:
#   name:     Display name shown in the interactive prompt
#   url:      Direct download URL for the cloud image
#   filename: Local filename used for caching on Proxmox nodes
#
# Storage location:
#   Images are downloaded to {storage_path}/cloud-images/ on the Proxmox node —
#   NOT to template/iso/ — so they do NOT appear in the Proxmox GUI ISO picker
#   and cannot be accidentally attached as a CD-ROM during manual VM creation.
#   The cloud-images/ directory is created automatically on first download.
#
# Notes:
#   - Ubuntu / Debian : .img files (raw with internal qcow2 layout)
#   - Rocky / Alma    : .qcow2 files
#   - CentOS Stream   : .qcow2 files
#   - Oracle Linux    : .qcow2 files — URL is version-specific (no "latest" redirect).
#                       Check https://yum.oracle.com/oracle-linux-templates.html
#                       when upgrading to a new Oracle Linux release.
#   - Fedora          : .qcow2 files — URL is version-specific (no "latest" redirect).
#                       Check https://fedoraproject.org/cloud/download
#                       when upgrading to a new Fedora release.
#   - openSUSE        : .qcow2 files — URL/filename may change between point releases.
#                       Check https://get.opensuse.org/leap/ or
#                       https://get.opensuse.org/tumbleweed/ for current image links.
#   - Alpine Linux    : .qcow2 files — URL is version-specific (no "latest" redirect).
#                       Check https://alpinelinux.org/cloud/ for current release.
#   - Arch Linux      : .qcow2 file — rolling release, filename is stable ("latest").
#   - FreeBSD         : .qcow2.xz file — URL is version-specific. The image ships
#                       compressed; decompress with `xz -d` before use or check if your
#                       Proxmox version supports direct .xz import.
#                       Check https://download.freebsd.org/releases/VM-IMAGES/ for current.
#   - All listed distros support cloud-init natively
#   - qm importdisk handles both .img and .qcow2 transparently
# ============================================================

cloud_images:

  # ── Ubuntu ──────────────────────────────────────────────
  - name: "Ubuntu 24.04 LTS (Noble Numbat)"
    url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
    filename: "noble-server-cloudimg-amd64.img"

  - name: "Ubuntu 22.04 LTS (Jammy Jellyfish)"
    url: "https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
    filename: "jammy-server-cloudimg-amd64.img"

  - name: "Ubuntu 20.04 LTS (Focal Fossa)"
    url: "https://cloud-images.ubuntu.com/focal/current/focal-server-cloudimg-amd64.img"
    filename: "focal-server-cloudimg-amd64.img"

  # ── Debian ──────────────────────────────────────────────
  - name: "Debian 12 (Bookworm)"
    url: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-generic-amd64.qcow2"
    filename: "debian-12-generic-amd64.qcow2"

  - name: "Debian 11 (Bullseye)"
    url: "https://cloud.debian.org/images/cloud/bullseye/latest/debian-11-generic-amd64.qcow2"
    filename: "debian-11-generic-amd64.qcow2"

  # ── RHEL-compatible ─────────────────────────────────────
  - name: "Rocky Linux 9"
    url: "https://dl.rockylinux.org/pub/rocky/9/images/x86_64/Rocky-9-GenericCloud.latest.x86_64.qcow2"
    filename: "Rocky-9-GenericCloud.latest.x86_64.qcow2"

  - name: "Rocky Linux 8"
    url: "https://dl.rockylinux.org/pub/rocky/8/images/x86_64/Rocky-8-GenericCloud.latest.x86_64.qcow2"
    filename: "Rocky-8-GenericCloud.latest.x86_64.qcow2"

  - name: "AlmaLinux 9"
    url: "https://repo.almalinux.org/almalinux/9/cloud/x86_64/images/AlmaLinux-9-GenericCloud-latest.x86_64.qcow2"
    filename: "AlmaLinux-9-GenericCloud-latest.x86_64.qcow2"

  - name: "AlmaLinux 8"
    url: "https://repo.almalinux.org/almalinux/8/cloud/x86_64/images/AlmaLinux-8-GenericCloud-latest.x86_64.qcow2"
    filename: "AlmaLinux-8-GenericCloud-latest.x86_64.qcow2"

  - name: "CentOS Stream 10"
    url: "https://cloud.centos.org/centos/10-stream/x86_64/images/CentOS-Stream-GenericCloud-10-latest.x86_64.qcow2"
    filename: "CentOS-Stream-GenericCloud-10-latest.x86_64.qcow2"

  - name: "CentOS Stream 9"
    url: "https://cloud.centos.org/centos/9-stream/x86_64/images/CentOS-Stream-GenericCloud-9-latest.x86_64.qcow2"
    filename: "CentOS-Stream-GenericCloud-9-latest.x86_64.qcow2"

  # NOTE: Oracle Linux cloud image URLs are version-specific (no "latest" redirect).
  # Check https://yum.oracle.com/oracle-linux-templates.html for current build URLs.
  - name: "Oracle Linux 9"
    url: "https://yum.oracle.com/templates/OracleLinux/OL9/u4/x86_64/OL9U4_x86_64-kvm-b234.qcow2"
    filename: "OL9U4_x86_64-kvm-b234.qcow2"

  - name: "Oracle Linux 8"
    url: "https://yum.oracle.com/templates/OracleLinux/OL8/u9/x86_64/OL8U9_x86_64-kvm-b234.qcow2"
    filename: "OL8U9_x86_64-kvm-b234.qcow2"

  # ── Fedora ──────────────────────────────────────────────
  # NOTE: Fedora cloud image URLs are version-specific (no "latest" redirect).
  # Check https://fedoraproject.org/cloud/download for the current build URL.
  - name: "Fedora 41 (Cloud Base)"
    url: "https://download.fedoraproject.org/pub/fedora/linux/releases/41/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-41-1.4.x86_64.qcow2"
    filename: "Fedora-Cloud-Base-Generic-41-1.4.x86_64.qcow2"

  # ── openSUSE ─────────────────────────────────────────────
  # NOTE: openSUSE image filenames change between point releases.
  # Check https://get.opensuse.org/leap/ for the current Leap URL.
  - name: "openSUSE Leap 15.6"
    url: "https://download.opensuse.org/distribution/leap/15.6/appliances/openSUSE-Leap-15.6-Minimal-VM.x86_64-Cloud.qcow2"
    filename: "openSUSE-Leap-15.6-Minimal-VM.x86_64-Cloud.qcow2"

  # NOTE: Tumbleweed is a rolling release — the filename may change with each snapshot.
  # Check https://get.opensuse.org/tumbleweed/ for the current URL.
  - name: "openSUSE Tumbleweed"
    url: "https://download.opensuse.org/tumbleweed/appliances/openSUSE-Tumbleweed-Minimal-VM.x86_64-Cloud.qcow2"
    filename: "openSUSE-Tumbleweed-Minimal-VM.x86_64-Cloud.qcow2"

  # ── Alpine Linux ─────────────────────────────────────────
  # NOTE: Alpine cloud image URLs are version-specific (no "latest" redirect).
  # Check https://alpinelinux.org/cloud/ for the current release and exact filename.
  - name: "Alpine Linux 3.21"
    url: "https://dl-cdn.alpinelinux.org/alpine/v3.21/releases/cloud/generic_alpine-3.21.0-x86_64-bios-cloudinit-r0.qcow2"
    filename: "generic_alpine-3.21.0-x86_64-bios-cloudinit-r0.qcow2"

  - name: "Alpine Linux 3.20"
    url: "https://dl-cdn.alpinelinux.org/alpine/v3.20/releases/cloud/generic_alpine-3.20.0-x86_64-bios-cloudinit-r0.qcow2"
    filename: "generic_alpine-3.20.0-x86_64-bios-cloudinit-r0.qcow2"

  # ── Arch Linux ───────────────────────────────────────────
  - name: "Arch Linux (rolling)"
    url: "https://geo.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2"
    filename: "Arch-Linux-x86_64-cloudimg.qcow2"

  # ── FreeBSD ──────────────────────────────────────────────
  # NOTE: FreeBSD cloud image URL is version-specific and ships compressed (.qcow2.xz).
  # Decompress with `xz -d <file>` before importing, or check if your Proxmox version
  # supports direct .xz import. Check https://download.freebsd.org/releases/VM-IMAGES/
  # for the current release and exact filename.
  - name: "FreeBSD 14 (UFS)"
    url: "https://download.freebsd.org/releases/VM-IMAGES/14.2-RELEASE/amd64/Latest/FreeBSD-14.2-RELEASE-amd64.qcow2.xz"
    filename: "FreeBSD-14.2-RELEASE-amd64.qcow2.xz"
