---
# Install lab-documenter prerequisites on all documented hosts
# Packages installed:
#   - lldpd       : LLDP neighbor discovery for switch port mapping
#   - aptitude    : Accurate manually-installed package listing (Debian/Ubuntu only)
#   - dmidecode   : BIOS info and memory module details
#   - lshw        : Hardware/memory info

- name: Install lab-documenter prerequisites
  hosts: Linux
  become: yes
  gather_facts: yes

  tasks:

    - name: Update apt cache (Debian/Ubuntu)
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Install prerequisites (Debian/Ubuntu)
      apt:
        name:
          - lldpd
          - aptitude
          - dmidecode
          - lshw
        state: present
      when: ansible_os_family == "Debian"

    - name: Install prerequisites (RHEL/Rocky/CentOS)
      dnf:
        name:
          - lldpd
          - dmidecode
          - lshw
        state: present
      when: ansible_os_family == "RedHat"

    - name: Enable and start lldpd (RHEL/Rocky/CentOS)
      service:
        name: lldpd
        state: started
        enabled: yes
      when: ansible_os_family == "RedHat"

    - name: Install prerequisites (openSUSE/SLES)
      zypper:
        name:
          - lldpd
          - dmidecode
          - lshw
        state: present
      when: ansible_os_family == "Suse"

    - name: Enable and start lldpd (openSUSE/SLES)
      service:
        name: lldpd
        state: started
        enabled: yes
      when: ansible_os_family == "Suse"

    - name: Verify lldpd is running
      service:
        name: lldpd
        state: started
        enabled: yes
      when: ansible_os_family == "Debian"
